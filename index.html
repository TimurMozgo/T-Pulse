<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-PULSE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo-group">
                <h1 class="logo">T-<span class="pulse">PULSE</span></h1>
            </div>
            <div class="balance-container">
                <div class="balance-item ton">
                    <span id="ton-balance" class="value">0.00</span>
                    <span class="currency">TON</span>
                </div>
                <div class="balance-item stars">
                    <span id="star-balance" class="value">0</span>
                    <span class="currency">⭐</span>
                </div>
            </div>
        </header>

        <div class="progress-container">
            <div class="progress-header">
                <span>LEVEL <span id="user-level">1</span></span>
                <span id="xp-text">0 / 100 XP</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <main class="game-board">
            <div class="wheel-wrapper">
                <div class="wheel-pointer"></div>
                <canvas id="wheel-canvas" width="1000" height="1000"></canvas>
                <button id="spin-btn" class="spin-button">TINELLPULSE</button>
            </div>
            
            <div id="result-display" class="result-display">
                КРУТИ И ЗАБИРАЙ ПРИЗ!
            </div>
        </main>

        <div class="actions-section">
            <button id="ins-btn" class="insurance-btn">ЗАСТРАХОВАТЬ 10 ⭐</button>
        </div>

        <footer class="history-section">
            <div class="feed-header">RECENT WINS</div>
            <div id="history-list" class="history-list">
                <div class="empty-feed">Удачи в первом вращении!</div>
            </div>
        </footer>

        <nav class="bottom-nav">
            <a href="inventory.html" class="nav-link">
                <span class="nav-icon">📦</span>
                <span class="nav-text">Инвентарь</span>
            </a>
            <a href="invite.html" class="nav-link">
                <span class="nav-icon">👥</span>
                <span class="nav-text">Друзья</span>
            </a>
            <a href="index.html" class="nav-link active">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">Главная</span>
            </a>
            <a href="leaderboard.html" class="nav-link">
                <span class="nav-icon">🏆</span>
                <span class="nav-text">Топ</span>
            </a>
        </nav>
    </div>

    <div id="win-popup" class="win-popup"></div>

    <script src="script.js"></script>
</body>
</html>
