<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рейтинг</title>
    <link rel="stylesheet" href="leaderboard.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <header class="rating-header" id="leaderboard-promo">
        <div class="trophy-wrapper">
            <span class="trophy-emoji">🏆</span>
        </div>
        <h1>ТОП ИГРОКОВ</h1>
        
        <div class="timer-container" id="timer-block" style="display: none;">
            <span class="timer-text">Заканчивается через</span>
            <div class="timer-countdown" id="main-timer">Вычисляем...</div>
        </div>
        
        <p class="description">
            Соревнуйтесь с другими пользователями и выигрывайте потрясающие призы!
        </p>
    </header>

    <main class="leaderboard-section">
        <div class="section-header">
            <span class="label-main">🏆 Топ игроков</span>
            <div class="label-stats">
                <span>Приз</span>
                <span>Lvl</span> <span>XP</span>  </div>
        </div>

        <div id="leaderboard-list">
             <div style="text-align:center; padding:20px; color:#8e8e93;">Аудитор проверяет списки...</div>
        </div>
    </main>

    <div class="sticky-user-footer">
        <div class="user-row">
            <span class="user-rank">999+</span>
            <div class="user-avatar-placeholder"></div>
            <div class="user-info-box">
                <span class="user-label">Вы</span>
                <span class="user-level-tag">Lvl 0</span> </div>
            <span class="user-points">0 XP</span> </div>
    </div>

    <nav class="bottom-nav">
        <a href="inventory.html" class="nav-link">
            <span class="nav-icon">📦</span>
            <span class="nav-text">Инвентарь</span>
        </a>
        <a href="invite.html" class="nav-link">
            <span class="nav-icon">👥</span>
            <span class="nav-text">Пригласить</span>
        </a>
        <a href="index.html" class="nav-link">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Главная</span>
        </a>
        <a href="leaderboard.html" class="nav-link active">
            <span class="nav-icon">🏆</span>
            <span class="nav-text">Рейтинг</span>
        </a>
    </nav>

    <script src="leaderboard.js"></script>
</body>
</html>
