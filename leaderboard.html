<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рейтинг Аудитора</title>
    <link rel="stylesheet" href="leaderboard.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <header class="rating-header">
        <div class="trophy-wrapper">
            <span class="trophy-emoji">🏆</span>
        </div>
        <h1>Рейтинг</h1>
        
        <div class="timer-container">
            <span class="timer-text">Заканчивается через</span>
            <div class="timer-countdown">2d 8h 41m</div>
        </div>
        
        <p class="description">
            Соревнуйтесь с другими пользователями и выигрывайте потрясающие призы!
        </p>
    </header>

    <main class="leaderboard-section">
        <div class="section-header">
            <span class="label-main">🏆 Топ игроков</span>
            <div class="label-stats">
                <span>Приз</span>
                <span>Очки</span>
            </div>
        </div>

        <div id="leaderboard-list">
            <div class="player-card top-1">
                <div class="rank-badge">1</div>
                <div class="player-info">
                    <span class="player-name">Do***on</span>
                </div>
                <div class="player-reward">🎁</div>
                <div class="player-score">5.3M</div>
            </div>
            
            <div class="player-card top-2">
                <div class="rank-badge">2</div>
                <div class="player-info">
                    <span class="player-name">CryptoKing</span>
                </div>
                <div class="player-reward">🎁</div>
                <div class="player-score">4.1M</div>
            </div>
        </div>
    </main>

    <div class="sticky-user-footer">
        <div class="user-row">
            <span class="user-rank">999+</span>
            <div class="user-avatar-placeholder"></div>
            <span class="user-label">Вы</span>
            <span class="user-points">0</span>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="inventory.html" class="nav-link">
            <span class="nav-icon">📦</span>
            <span class="nav-text">Инвентарь</span>
        </a>
        <a href="friends.html" class="nav-link">
            <span class="nav-icon">👥</span>
            <span class="nav-text">Друзья</span>
        </a>
        <a href="index.html" class="nav-link">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Главная</span>
        </a>
        <a href="leaderboard.html" class="nav-link active">
            <span class="nav-icon">🏆</span>
            <span class="nav-text">Рейтинг</span>
        </a>
    </nav>

    <script src="leaderboard.js"></script>
</body>
</html>
